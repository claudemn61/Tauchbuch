<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Tauch-Statistik</title>

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tauch-Statistik" />
<meta name="theme-color" content="#210710" />

<style>
  html, body { margin:0; padding:0; background:#210710; -webkit-tap-highlight-color: transparent; }
  #root { min-height: 100vh; }
  * { -webkit-touch-callout: none; }
  input, textarea, button { -webkit-user-select: text; user-select: text; }
  #load-status { color:#fcd34d; font-family:monospace; font-size:11px; padding:14px; white-space:pre-wrap; }
</style>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="load-status">Lade React/Babel…</div>
<div id="root"></div>

<script>
  // Storage backed by IndexedDB — identical bootstrap to index.html/flugbuch,
  // so Tauchbuch shares the same robust, high-quota persistence layer.
  (function () {
    const DB_NAME = "tauchbuch-db";
    const STORE = "kv";
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        if (!window.indexedDB) { reject(new Error("IndexedDB not available")); return; }
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function idbGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).get(key);
        req.onsuccess = () => resolve(req.result !== undefined ? req.result : null);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSet(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbDelete(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbKeys() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).getAllKeys();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    const PREFIX = "tauchbuch:";
    function keyFor(key) { return PREFIX + key; }

    let migrated = false;
    async function migrateFromLocalStorageOnce() {
      if (migrated) return;
      migrated = true;
      try {
        const existingKeys = new Set(await idbKeys());
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(PREFIX) && !existingKeys.has(k)) {
            await idbSet(k, localStorage.getItem(k));
          }
        }
      } catch (e) { console.error("Migration to IndexedDB failed:", e); }
    }

    window.storage = {
      async get(key) {
        try {
          await migrateFromLocalStorageOnce();
          const raw = await idbGet(keyFor(key));
          if (raw !== null) return { key, value: raw };
          const lsRaw = localStorage.getItem(keyFor(key));
          return lsRaw !== null ? { key, value: lsRaw } : null;
        } catch (e) {
          console.error("storage.get error, falling back to localStorage:", e);
          try {
            const raw = localStorage.getItem(keyFor(key));
            return raw !== null ? { key, value: raw } : null;
          } catch { return null; }
        }
      },
      async set(key, value) {
        try {
          await migrateFromLocalStorageOnce();
          await idbSet(keyFor(key), value);
          return { key, value };
        } catch (e) {
          console.error("storage.set error, falling back to localStorage:", e);
          try { localStorage.setItem(keyFor(key), value); return { key, value }; }
          catch (e2) { console.error("localStorage fallback also failed:", e2); return null; }
        }
      },
      async delete(key) {
        try {
          await migrateFromLocalStorageOnce();
          const existedIdb = (await idbGet(keyFor(key))) !== null;
          await idbDelete(keyFor(key));
          try { localStorage.removeItem(keyFor(key)); } catch {}
          return { key, deleted: existedIdb };
        } catch (e) {
          console.error("storage.delete error, falling back to localStorage:", e);
          try {
            const k = keyFor(key);
            const existed = localStorage.getItem(k) !== null;
            localStorage.removeItem(k);
            return { key, deleted: existed };
          } catch { return null; }
        }
      },
      async list(prefix) {
        try {
          await migrateFromLocalStorageOnce();
          const fullPrefix = PREFIX + (prefix || "");
          const allKeys = await idbKeys();
          const keys = allKeys.filter(k => typeof k === "string" && k.startsWith(fullPrefix)).map(k => k.slice(PREFIX.length));
          return { keys, prefix };
        } catch (e) {
          console.error("storage.list error, falling back to localStorage:", e);
          try {
            const fullPrefix = PREFIX + (prefix || "");
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (k && k.startsWith(fullPrefix)) keys.push(k.slice(PREFIX.length));
            }
            return { keys, prefix };
          } catch { return null; }
        }
      },
    };
  })();

  window.addEventListener("error", function (e) {
    const el = document.getElementById("load-status");
    el.style.display = "block";
    el.style.color = "#f87171";
    el.textContent = "JS-FEHLER: " + (e.error ? (e.error.stack || e.error.message) : e.message) + " (Zeile " + e.lineno + ")";
  });
  window.addEventListener("unhandledrejection", function (e) {
    const el = document.getElementById("load-status");
    el.style.display = "block";
    el.style.color = "#f87171";
    el.textContent = "PROMISE-FEHLER: " + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
  });

  async function checkAndRender() {
    const status = document.getElementById("load-status");
    if (typeof React === "undefined") { status.textContent = "FEHLER: React konnte nicht geladen werden (CDN blockiert?)"; status.style.color="#f87171"; return; }
    if (typeof ReactDOM === "undefined") { status.textContent = "FEHLER: ReactDOM konnte nicht geladen werden (CDN blockiert?)"; status.style.color="#f87171"; return; }
    if (typeof Babel === "undefined") { status.textContent = "FEHLER: Babel konnte nicht geladen werden (CDN blockiert?)"; status.style.color="#f87171"; return; }
    status.textContent = "React/Babel geladen ✓ — lade Seite…";

    let appSource;
    try {
      const resp = await fetch("statistik.jsx");
      if (!resp.ok) { status.textContent = "FEHLER beim Laden von statistik.jsx: HTTP " + resp.status; status.style.color = "#f87171"; return; }
      appSource = await resp.text();
      status.textContent = "Code geladen ✓ (" + appSource.length + " Zeichen) — kompiliere…";
    } catch (e) {
      status.style.color = "#f87171";
      status.textContent = "FEHLER beim Laden von statistik.jsx:\n" + (e.message || String(e));
      return;
    }

    let compiled;
    try {
      compiled = Babel.transform(appSource, { presets: ["react"] }).code;
      status.textContent = "Kompiliert ✓ — starte Seite…";
    } catch (e) {
      status.style.color = "#f87171";
      status.textContent = "BABEL-KOMPILIER-FEHLER:\n" + (e.message || String(e));
      return;
    }
    try {
      const runApp = new Function("React", "ReactDOM", compiled + "\n; return StatistikApp;");
      const StatistikApp = runApp(React, ReactDOM);
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(StatistikApp));
      setTimeout(function() {
        if (!status.textContent.includes("FEHLER")) status.style.display = "none";
      }, 800);
    } catch (e) {
      status.style.color = "#f87171";
      status.textContent = "RENDER-FEHLER:\n" + (e.message || String(e)) + "\n\n" + (e.stack || "");
    }
  }

  window.addEventListener("load", function() {
    setTimeout(checkAndRender, 300);
  });
</script>

</body>
</html>
