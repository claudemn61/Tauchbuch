<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Tauch-Statistik</title>

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tauch-Statistik" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="icon" href="favicon-32.png" sizes="32x32" />
<meta name="theme-color" content="#210710" />

<style>
  html, body { margin:0; padding:0; background:#210710; -webkit-tap-highlight-color: transparent; }
  #root { min-height: 100vh; }
  * { -webkit-touch-callout: none; }
  input, textarea, button { -webkit-user-select: text; user-select: text; }
  #load-status { color:#fcd34d; font-family:monospace; font-size:11px; padding:14px; white-space:pre-wrap; }
</style>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="load-status">Lade React/Babel…</div>
<div id="root"></div>

<script>
  // Storage backed by IndexedDB — identical bootstrap to index.html/flugbuch,
  // so Tauchbuch shares the same robust, high-quota persistence layer.
  (function () {
    const DB_NAME = "tauchbuch-db";
    const STORE = "kv";
    let dbPromise = null;

    function openDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        if (!window.indexedDB) { reject(new Error("IndexedDB not available")); return; }
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return dbPromise;
    }

    async function idbGet(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).get(key);
        req.onsuccess = () => resolve(req.result !== undefined ? req.result : null);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSet(key, value) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbDelete(key) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbKeys() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).getAllKeys();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    const PREFIX = "tauchbuch:";
    function keyFor(key) { return PREFIX + key; }

    let migrated = false;
    async function migrateFromLocalStorageOnce() {
      if (migrated) return;
      migrated = true;
      try {
        const existingKeys = new Set(await idbKeys());
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(PREFIX) && !existingKeys.has(k)) {
            await idbSet(k, localStorage.getItem(k));
          }
        }
      } catch (e) { console.error("Migration to IndexedDB failed:", e); }
    }

    window.storage = {
      async get(key) {
        try {
          await migrateFromLocalStorageOnce();
          const raw = await idbGet(keyFor(key));
          if (raw !== null) return { key, value: raw };
          const lsRaw = localStorage.getItem(keyFor(key));
          return lsRaw !== null ? { key, value: lsRaw } : null;
        } catch (e) {
          console.error("storage.get error, falling back to localStorage:", e);
          try {
            const raw = localStorage.getItem(keyFor(key));
            return raw !== null ? { key, value: raw } : null;
          } catch { return null; }
        }
      },
      async set(key, value) {
        try {
          await migrateFromLocalStorageOnce();
          await idbSet(keyFor(key), value);
          return { key, value };
        } catch (e) {
          console.error("storage.set error, falling back to localStorage:", e);
          try { localStorage.setItem(keyFor(key), value); return { key, value }; }
          catch (e2) { console.error("localStorage fallback also failed:", e2); return null; }
        }
      },
      async delete(key) {
        try {
          await migrateFromLocalStorageOnce();
          const existedIdb = (await idbGet(keyFor(key))) !== null;
          await idbDelete(keyFor(key));
          try { localStorage.removeItem(keyFor(key)); } catch {}
          return { key, deleted: existedIdb };
        } catch (e) {
          console.error("storage.delete error, falling back to localStorage:", e);
          try {
            const k = keyFor(key);
            const existed = localStorage.getItem(k) !== null;
            localStorage.removeItem(k);
            return { key, deleted: existed };
          } catch { return null; }
        }
      },
      async list(prefix) {
        try {
          await migrateFromLocalStorageOnce();
          const fullPrefix = PREFIX + (prefix || "");
          const allKeys = await idbKeys();
          const keys = allKeys.filter(k => typeof k === "string" && k.startsWith(fullPrefix)).map(k => k.slice(PREFIX.length));
          return { keys, prefix };
        } catch (e) {
          console.error("storage.list error, falling back to localStorage:", e);
          try {
            const fullPrefix = PREFIX + (prefix || "");
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
              const k = localStorage.key(i);
              if (k && k.startsWith(fullPrefix)) keys.push(k.slice(PREFIX.length));
            }
            return { keys, prefix };
          } catch { return null; }
        }
      },
    };
  })();

  // Persistenter Log — schreibt Fehler/Ereignisse seitenübergreifend in den
  // gemeinsamen Storage, damit sie im Settings-Panel der Startseite (Log-
  // Dateien) einsehbar sind, unabhängig davon, auf welcher Seite sie auftraten.
  const LOG_PAGE_NAME = (document.title || location.pathname).replace(/^\/|\.html$/g, "") || "app";
  async function appendLog(message) {
    try {
      const key = "settings:logs";
      let list = [];
      try { const r = await window.storage.get(key); if (r) list = JSON.parse(r.value) || []; } catch {}
      list.push({ ts: new Date().toISOString(), page: LOG_PAGE_NAME, message: String(message).slice(0, 2000) });
      if (list.length > 50) list = list.slice(list.length - 50);
      await window.storage.set(key, JSON.stringify(list));
    } catch (e) { console.error("Log-Speicherfehler:", e); }
  }

  window.addEventListener("error", function (e) {
    const el = document.getElementById("load-status");
    el.style.display = "block";
    el.style.color = "#f87171";
    const msg = "JS-FEHLER: " + (e.error ? (e.error.stack || e.error.message) : e.message) + " (Zeile " + e.lineno + ")";
    el.textContent = msg;
    appendLog(msg);
  });
  window.addEventListener("unhandledrejection", function (e) {
    const el = document.getElementById("load-status");
    el.style.display = "block";
    el.style.color = "#f87171";
    const msg = "PROMISE-FEHLER: " + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
    el.textContent = msg;
    appendLog(msg);
  });

  async function checkAndRender() {
    const status = document.getElementById("load-status");
    if (typeof React === "undefined") { status.textContent = "FEHLER: React konnte nicht geladen werden (CDN blockiert?)"; status.style.color="#f87171"; return; }
    if (typeof ReactDOM === "undefined") { status.textContent = "FEHLER: ReactDOM konnte nicht geladen werden (CDN blockiert?)"; status.style.color="#f87171"; return; }
    if (typeof Babel === "undefined") { status.textContent = "FEHLER: Babel konnte nicht geladen werden (CDN blockiert?)"; status.style.color="#f87171"; return; }
    status.textContent = "React/Babel geladen ✓ — lade Seite…";

    let appSource;
    try {
      const resp = await fetch("statistik.jsx?v=" + Date.now(), { cache: "no-store" });
      if (!resp.ok) { status.textContent = "FEHLER beim Laden von statistik.jsx: HTTP " + resp.status; status.style.color = "#f87171"; return; }
      appSource = await resp.text();
      status.textContent = "Code geladen ✓ (" + appSource.length + " Zeichen) — kompiliere…";
    } catch (e) {
      status.style.color = "#f87171";
      status.textContent = "FEHLER beim Laden von statistik.jsx:\n" + (e.message || String(e));
      return;
    }

    let compiled;
    try {
      compiled = Babel.transform(appSource, { presets: ["react"] }).code + "\n//# sourceURL=statistik.jsx";
      status.textContent = "Kompiliert ✓ — starte Seite…";
    } catch (e) {
      status.style.color = "#f87171";
      status.textContent = "BABEL-KOMPILIER-FEHLER:\n" + (e.message || String(e));
      appendLog("BABEL-KOMPILIER-FEHLER: " + (e.message || String(e)));
      return;
    }
    try {
      const runApp = new Function("React", "ReactDOM", compiled + "\n; return StatistikApp;");
      const StatistikApp = runApp(React, ReactDOM);

      // Error Boundary: catches errors thrown during render/lifecycle — even
      // ones happening later (e.g. after data finishes loading from storage),
      // which the outer try/catch below can't see since those happen outside
      // this synchronous call. React hands componentDidCatch the real Error
      // object directly, so the message is never masked the way a global
      // window "error" event can be for cross-origin script code.
      class AppErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { error: null, info: null }; }
        static getDerivedStateFromError(error) { return { error }; }
        componentDidCatch(error, info) {
          console.error("App-Fehler:", error, info);
          this.setState({ info });
          appendLog("APP-FEHLER: " + ((error && (error.stack || error.message)) || String(error)));
        }
        render() {
          if (this.state.error) {
            const e = this.state.error;
            const stack = (e && (e.stack || e.message)) || String(e);
            const compStack = this.state.info && this.state.info.componentStack || "";
            return React.createElement("div", {
              style: { padding: "20px 16px", color: "#f87171", fontFamily: "monospace", fontSize: 12, whiteSpace: "pre-wrap", lineHeight: 1.6 }
            }, "APP-FEHLER:\n\n" + stack + (compStack ? "\n\nKOMPONENTEN-STACK:" + compStack : ""));
          }
          return this.props.children;
        }
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(AppErrorBoundary, null, React.createElement(StatistikApp)));
      setTimeout(function() {
        if (!status.textContent.includes("FEHLER")) status.style.display = "none";
      }, 800);
    } catch (e) {
      status.style.color = "#f87171";
      status.textContent = "RENDER-FEHLER:\n" + (e.message || String(e)) + "\n\n" + (e.stack || "");
      appendLog("RENDER-FEHLER: " + (e.message || String(e)));
    }
  }


  window.addEventListener("load", function() {
    setTimeout(checkAndRender, 300);
  });
</script>

</body>
</html>
